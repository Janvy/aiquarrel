version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: aiquarrel-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app-net

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    container_name: aiquarrel-backend
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - ../.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - app-net

  mysql:
    image: mysql:8.0
    container_name: aiquarrel-mysql
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aiquarrel}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: aiquarrel-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-net

volumes:
  mysql_data:
  redis_data:

networks:
  app-net:
    driver: bridge
