worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 限流区域
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $http_x_device_id zone=device_limit:10m rate=10r/s;

    # Gzip
    gzip on;
    gzip_min_length 512;
    gzip_types text/plain application/json application/javascript text/css image/png;

    server {
        listen 80;
        server_name api.aiquarrel.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.aiquarrel.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API 反向代理
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req zone=device_limit burst=5 nodelay;

            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Device-Id $http_x_device_id;

            proxy_read_timeout 15s;
            proxy_connect_timeout 5s;
        }

        # 静态资源（分享图片等）
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 健康检查
        location /api/health {
            proxy_pass http://backend:8080;
            access_log off;
        }
    }
}
