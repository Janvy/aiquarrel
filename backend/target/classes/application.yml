server:
  port: 9080

spring:
  application:
    name: ai-quarrel

  datasource:
    url: jdbc:mysql://localhost:3308/aiquarrel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai:
  deepseek:
    api-key: sk-1c68e305acc24fdb850251a14f316be6
    base-url: https://api.deepseek.com
    model: deepseek-v4-pro
    timeout: 10000
    max-tokens: 200
    temperature: 1.2

app:
  rate-limit:
    device-qps: 10
    ip-qps: 5
    daily-limit: 50
  content:
    max-scene-length: 200
    content-preview-length: 30
